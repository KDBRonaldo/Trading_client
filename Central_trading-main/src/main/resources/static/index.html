<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>交易日志监控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            background: #1a1a2e;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: #16213e;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }
        header h1 {
            font-size: 16px;
            font-weight: 600;
            color: #e94560;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #e74c3c;
        }
        .status-dot.connected { background: #2ecc71; }
        .controls {
            background: #16213e;
            padding: 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #0f3460;
        }
        .controls button {
            background: #0f3460;
            color: #e0e0e0;
            border: 1px solid #533483;
            padding: 4px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .controls button:hover { background: #533483; }
        .controls button.active { background: #e94560; border-color: #e94560; }
        .count { font-size: 12px; color: #888; margin-left: auto; }
        .log-container {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }
        thead {
            position: sticky;
            top: 0;
            background: #16213e;
            z-index: 1;
        }
        th {
            padding: 8px 12px;
            text-align: left;
            color: #888;
            font-weight: 500;
            border-bottom: 1px solid #0f3460;
        }
        td {
            padding: 6px 12px;
            border-bottom: 1px solid #1a1a2e;
        }
        tr:hover { background: #16213e; }
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            min-width: 40px;
            text-align: center;
        }
        .badge-ORDER { background: #1e3a5f; color: #5dade2; }
        .badge-MATCH { background: #1e4d2b; color: #2ecc71; }
        .badge-CANCEL { background: #4d3800; color: #f39c12; }
        .badge-QUOTE { background: #3d1f56; color: #a569bd; }
        .badge-ERROR { background: #4d1a1a; color: #e74c3c; }
        .badge-SYSTEM { background: #2d2d2d; color: #95a5a6; }
        .time { color: #888; white-space: nowrap; }
        .stock { color: #f39c12; font-weight: 600; }
        .account { color: #5dade2; }
        .detail { color: #bbb; }
        .empty-state {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 200px;
            color: #555;
            font-size: 14px;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }
        tr.new-row { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>
    <header>
        <h1>Central Trading - 交易日志实时监控</h1>
        <div class="status">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">未连接</span>
        </div>
    </header>
    <div class="controls">
        <button id="toggleScroll">暂停滚动</button>
        <button id="clearLog">清空日志</button>
        <span class="count" id="count">0 条记录</span>
    </div>
    <div class="log-container" id="logContainer">
        <table>
            <thead>
                <tr>
                    <th style="width:140px">时间</th>
                    <th style="width:60px">类型</th>
                    <th style="width:80px">股票</th>
                    <th style="width:140px">用户</th>
                    <th>详情</th>
                </tr>
            </thead>
            <tbody id="logBody">
            </tbody>
        </table>
        <div class="empty-state" id="emptyState">等待交易事件...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <script>
        const MAX_ROWS = 500;
        let autoScroll = true;
        let rowCount = 0;
        let stompClient = null;

        const logBody = document.getElementById('logBody');
        const logContainer = document.getElementById('logContainer');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');
        const countEl = document.getElementById('count');
        const emptyState = document.getElementById('emptyState');
        const toggleBtn = document.getElementById('toggleScroll');
        const clearBtn = document.getElementById('clearLog');

        function connect() {
            const socket = new SockJS('/ws');
            stompClient = Stomp.over(socket);
            stompClient.debug = null;

            stompClient.connect({}, function() {
                statusDot.className = 'status-dot connected';
                statusText.textContent = '已连接';

                stompClient.subscribe('/topic/trading-log', function(message) {
                    const event = JSON.parse(message.body);
                    addRow(event);
                });
            }, function() {
                statusDot.className = 'status-dot';
                statusText.textContent = '已断开，重连中...';
                setTimeout(connect, 3000);
            });
        }

        function addRow(event) {
            emptyState.style.display = 'none';

            const tr = document.createElement('tr');
            tr.className = 'new-row';

            const time = event.timestamp ? event.timestamp.substring(11, 23) : '--:--:--';
            const type = event.type || 'SYSTEM';
            const label = event.label || type;
            const stock = event.stockCode || '-';
            const account = event.accountId || '-';
            const detail = event.detail || '';

            tr.innerHTML = `
                <td class="time">${time}</td>
                <td><span class="badge badge-${type}">${label}</span></td>
                <td class="stock">${stock}</td>
                <td class="account">${account}</td>
                <td class="detail">${detail}</td>
            `;

            logBody.appendChild(tr);
            rowCount++;

            while (logBody.children.length > MAX_ROWS) {
                logBody.removeChild(logBody.firstChild);
            }

            countEl.textContent = rowCount + ' 条记录';

            if (autoScroll) {
                logContainer.scrollTop = logContainer.scrollHeight;
            }
        }

        toggleBtn.addEventListener('click', function() {
            autoScroll = !autoScroll;
            toggleBtn.textContent = autoScroll ? '暂停滚动' : '恢复滚动';
            toggleBtn.classList.toggle('active', !autoScroll);
        });

        clearBtn.addEventListener('click', function() {
            logBody.innerHTML = '';
            rowCount = 0;
            countEl.textContent = '0 条记录';
            emptyState.style.display = 'flex';
        });

        connect();
    </script>
</body>
</html>
